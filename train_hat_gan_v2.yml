# HAT-GAN Historical v2 — fine-tune from net_g_180000.pth using the
# named HistoricalDegradationDataset (replaces the in-place hijack of
# RealESRGANDataset). 80 k more iters, lower LRs, fresh optimizer state.
name: HAT_GAN_Historical_v2
model_type: HATModel
scale: 4
num_gpu: 1
manual_seed: 42
high_order_degradation: false
l1_gt_usm: true
percep_gt_usm: true
gan_gt_usm: true

datasets:
  train:
    name: historical_v2
    type: HistoricalDegradationDataset
    dataroot_gt: datasets/HR_train
    meta_info: datasets/meta_info_train.txt
    io_backend:
      type: disk
    gt_size: 192
    use_hflip: true
    use_rot: true
    batch_size_per_gpu: 2
    num_worker_per_gpu: 4
    dataset_enlarge_ratio: 10
    pin_memory: true

  val:
    name: val_historical
    type: PairedImageDataset
    dataroot_gt: datasets/val/GT
    dataroot_lq: datasets/val/LQ
    io_backend:
      type: disk

network_g:
  type: HAT
  upscale: 4
  in_chans: 3
  img_size: 64
  window_size: 16
  overlap_ratio: 0.5
  depths: [6, 6, 6, 6, 6, 6, 6, 6, 6, 6, 6, 6]
  embed_dim: 180
  num_heads: [6, 6, 6, 6, 6, 6, 6, 6, 6, 6, 6, 6]
  compress_ratio: 2
  squeeze_factor: 30
  upsampler: pixelshuffle

network_d:
  type: UNetDiscriminatorSN
  num_in_ch: 3
  num_feat: 64

path:
  # Start from v1's best checkpoint, but reset the optimizer state because
  # the data distribution is now slightly different (clean dataset class,
  # per-worker seeding) and we want fresh LR / momentum.
  pretrain_network_g: BasicSR/experiments/HAT_GAN_Historical_v1/models/net_g_180000.pth
  param_key_g: params_ema
  strict_load_g: true
  resume_state: ~

train:
  total_iter: 80000  # 80 k of fine-tuning, NOT 250 k from scratch
  warmup_iter: -1
  optim_g:
    type: Adam
    lr: !!float 2e-5  # was 5e-5 in v1; we are fine-tuning, not training fresh
  optim_d:
    type: Adam
    lr: !!float 5e-5  # was 1e-4 in v1
  pixel_opt:
    type: CharbonnierLoss
    loss_weight: 0.1
  perceptual_opt:
    type: PerceptualLoss
    layer_weights:
      'conv1_2': 0.5
      'conv2_2': 0.5
      'conv3_4': 1.0
      'conv5_4': 1.0
    vgg_type: vgg19
    perceptual_weight: 1.0
  gan_opt:
    type: GANLoss
    gan_type: lsgan
    loss_weight: !!float 1.5e-1
  ema_decay: 0.999

  scheduler:
    type: MultiStepLR
    milestones: [50000, 70000]
    gamma: 0.5

logger:
  print_freq: 100
  save_checkpoint_freq: 5000
  use_tb_logger: true
  visual_freq: 2000
  wandb:
    project: HAT-GAN-Historical
    resume_id: ~

val:
  val_freq: 5000
  save_img: true
  metrics:
    psnr:
      type: calculate_psnr
      crop_border: 4
      test_y_channel: false
    ssim:
      type: calculate_ssim
      crop_border: 4
      test_y_channel: false
